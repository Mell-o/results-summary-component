<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="styles.css">
  
  <title>Frontend Mentor | Results summary component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <div class="main-card">
    <div class="results">
      <h1 class="results-title">Your Result</h1>
      <div class="score-circle" aria-label="76 of 100">
        <span class="score-value">76</span>
        <span class="score-total">of 100</span>
      </div>
      <p class="result-message-label">Great</p>
      <p class="result-message-text">You scored higher than 65% of the people who have taken these tests.</p>
    </div>
    <div class="summary">
      <h1 class="summary-title">Summary</h1>
      <div class="categories">
        <div class="category reaction-cat">
          <div class="cat-label">
            <img src="./assets/images/icon-reaction.svg">
            <span>Reaction</span>
          </div>
          <div class="cat-score">
            <span>80</span><span class="cat-score-total"> / 100</span>
          </div>
        </div>
        <div class="category memory-cat">
            <div class="cat-label">
              <img src="./assets/images/icon-memory.svg">
              <span>Memory</span>
          </div>
          <div class="cat-score">
            <span>92</span><span class="cat-score-total"> / 100</span>
          </div>
        </div>
        <div class="category verbal-cat">
          <div class="cat-label">
            <img src="./assets/images/icon-verbal.svg">
            <span>Verbal</span>
          </div>
          <div class="cat-score">
            <span>61</span><span class="cat-score-total"> / 100</span>
          </div>
        </div>
        <div class="category visual-cat">
          <div class="cat-label">
            <img src="./assets/images/icon-visual.svg">
            <span>Visual</span>
          </div>
          <div class="cat-score">
            <span>72</span><span class="cat-score-total"> / 100</span>
          </div>
        </div>
      </div>
      <button class="continue-btn">Continue</button>
    </div>
  </div>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </footer>
  <script type="module" src="./index.js" defer></script>
</body>
</html>
