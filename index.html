<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="styles.css">
  
  <title>Frontend Mentor | Results summary component</title>
</head>
<body>
  <main class="main-card">
    <section class="results">
      <h1 class="results-title">Your Result</h1>
      <div class="score-circle" role="text">
        <span class="score-value">76</span>
        <span class="score-total">of 100</span>
      </div>
      <h2 class="result-message-label">Great</h2>
      <p class="result-message-text">You scored higher than 65% of the people who have taken these tests.</p>
    </section>

    <section class="summary">
      <h2 class="summary-title">Summary</h2>

      <ul class="categories"></ul>

      <button class="continue-btn">Continue</button>
    </section>
  </main>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Mellow</a>.
  </footer>
  <script type="module" src="./index.js" defer></script>
</body>
</html>
